<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instapic • Your Code</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/branding/branding.css">
</head>
<body class="branding-live" data-page="ticket" data-timeout-redirect="index.html">
  <div class="cosmic-bg"></div>

  <header class="site-header">
    <div class="logo-wrap">
      <img src="assets/img/instapic_logo.png" alt="Instapic logo" class="site-logo">
      <div class="site-title">
        <span class="brand-main">insta<span class="brand-accent">pic</span></span>
        <span class="brand-sub">by Little Trends — Darwin NT</span>
      </div>
    </div>
  </header>

  <main class="ticket-page">
    <section class="hero-card">
      <p class="hero-kicker">Session Code</p>
      <h1>Your Code Is Ready ✨</h1>
      <div id="code-display" class="big-code">------</div>
      <p class="hero-text">
        Enter this code at the booth to begin your session.
      </p>
      <div class="portal-actions">
        <a class="portal-button primary" href="session.html">View Bonus Later</a>
        <a class="portal-button" href="index.html">Back Home</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>© Instapic — Have fun, be silly, love the photos forever ✨</small>
  </footer>

  <script src="assets/main.js"></script>
  <script src="assets/branding/branding.js"></script>
  <script src="assets/core/site_core.js"></script>
  <script src="assets/core/ticket_runtime.js"></script>
</body>
</html>
