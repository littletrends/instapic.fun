<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instapic • Your Code</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-timeout-redirect="index.html">

  <div class="cosmic-bg"></div>

  <header class="site-header">
    <div class="logo-wrap">
      <div class="site-title">
        <span class="brand-main">insta<span class="brand-accent">pic</span></span>
        <span class="brand-sub">by Little Trends — Darwin NT</span>
      </div>
    </div>
  </header>

  <main class="ticket-page">
    <h1>Your Magic Code ✨</h1>
    <p class="hero-text">Show this to the mirror when it’s your turn in the queue.</p>

    <!-- BIG GLOWING CODE DISPLAY -->
    <div class="code-display">
      <span id="code-display">------</span>
    </div>

    <p class="hint">Take a screenshot — the adventure is waiting 🦘</p>
  </main>

  <footer class="site-footer">
    <small>© Instapic — Have fun, be silly, love the photos forever ✨</small>
  </footer>

  <script src="assets/main.js"></script>
  <script>
    // Read code from URL (e.g. ticket.html?code=912600)
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '------';
    document.getElementById('code-display').textContent = code;
  </script>
</body>
</html>
