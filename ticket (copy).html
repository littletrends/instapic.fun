<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Instapic — Your code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="logo-wrap">
      <div class="site-title">
        <span class="brand-main">insta<span class="brand-accent">pic</span></span>
        <span class="brand-sub">by Little Trends — Darwin NT</span>
      </div>
    </div>
  </header>

  <main class="site-main">
    <section class="ticket">
      <h1>You’re all set!</h1>
      <p class="hero-text">Show this code to the Magic Mirror when it’s your turn in the queue.</p>
      <div class="ticket-code" id="ticket-code">------</div>
      <p class="ticket-help">Tip: take a screenshot so you don’t lose it.</p>
      <div class="hero-links">
        <a href="index.html" class="secondary-link">Back to start</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>&copy; Instapic — Have fun, be silly, love the photos ✨</small>
  </footer>

  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || '------';
      document.getElementById('ticket-code').textContent = code;
    })();
  </script>
</body>
</html>
