<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Instapic Fun — View Your Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="branding.css">
</head>
<body class="page" data-page="session" data-timeout-redirect="index.html">
  <main class="card">
    <div id="flash" hidden></div>

    <h1>View your photos</h1>
    <p class="muted">
      Type your 6-digit Instapic code from the mirror or your receipt.
    </p>

    <form id="session-form" class="code-card" novalidate autocomplete="off">
      <label for="ticket_code">Instapic code</label>

      <div class="code-input-row">
        <input
          type="text"
          id="ticket_code"
          name="ticket_code"
          maxlength="6"
          pattern="[0-9]{6}"
          inputmode="numeric"
          placeholder="123456"
          required
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          enterkeyhint="done"
        >
        <button type="submit" class="btn">Show my photos</button>
      </div>

      <p id="processing" class="muted" hidden>Checking your code…</p>
      <p class="muted">Numbers only, no spaces.</p>

      <div class="keypad">
        <div class="keypad-row">
          <button type="button" class="keypad-key" data-key="1">1</button>
          <button type="button" class="keypad-key" data-key="2">2</button>
          <button type="button" class="keypad-key" data-key="3">3</button>
        </div>
        <div class="keypad-row">
          <button type="button" class="keypad-key" data-key="4">4</button>
          <button type="button" class="keypad-key" data-key="5">5</button>
          <button type="button" class="keypad-key" data-key="6">6</button>
        </div>
        <div class="keypad-row">
          <button type="button" class="keypad-key" data-key="7">7</button>
          <button type="button" class="keypad-key" data-key="8">8</button>
          <button type="button" class="keypad-key" data-key="9">9</button>
        </div>
        <div class="keypad-row">
          <button type="button" class="keypad-key" data-action="clear">Clear</button>
          <button type="button" class="keypad-key" data-key="0">0</button>
          <button type="button" class="keypad-key" data-action="back">←</button>
        </div>
      </div>
    </form>

    <p><a class="btn" href="index.html">Back to start</a></p>
  </main>

  <script src="assets/main.js"></script>
  <script src="site_core.js"></script>
  <script src="branding.js"></script>
  <script src="session_runtime.js"></script>
</body>
</html>
