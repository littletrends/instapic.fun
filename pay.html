<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Instapic Fun — Get a Booth Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="branding.css">
</head>
<body class="page" data-page="pay" data-timeout-redirect="index.html">
  <main class="card">
    <div id="flash" hidden></div>

    <h1>Choose your package</h1>
    <p class="muted">
      Tap a package below to instantly generate your 6-digit Instapic code.
    </p>

    <div class="package-grid">
      <button type="button" class="package-card package-portal" data-package-id="P1_STRIP" data-amount-cents="700">
        <h2>$7</h2>
        <p>Classic photo strip</p>
        <div class="pkg-price">1 Strip</div>
        <div class="btn">Generate code</div>
      </button>

      <button type="button" class="package-card package-portal" data-package-id="P2_STRIP_GIF" data-amount-cents="1300">
        <h2>$13</h2>
        <p>Strip + GIF bonus</p>
        <div class="pkg-price">Digital extra</div>
        <div class="btn">Generate code</div>
      </button>

      <button type="button" class="package-card package-portal" data-package-id="P3_STRIP_GIF" data-amount-cents="1800">
        <h2>$18</h2>
        <p>Premium strip + bonus set</p>
        <div class="pkg-price">Full bonus</div>
        <div class="btn">Generate code</div>
      </button>
    </div>

    <div id="ticket-result" hidden>
      <h2>Your code</h2>
      <div id="ticket-code" class="ticket-code">------</div>
      <p class="muted">Redirecting to your ticket page…</p>
    </div>

    <p class="muted">
      Your code will appear on the next screen. Take it to the booth and enter it there.
    </p>

    <p><a class="btn" href="index.html">Back to start</a></p>
  </main>

  <script src="assets/main.js"></script>
  <script src="site_core.js"></script>
  <script src="branding.js"></script>
  <script src="pay_runtime.js"></script>
</body>
</html>
