<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instapic • Choose Your Magic</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-timeout-redirect="index.html">

  <div class="cosmic-bg"></div>

  <header class="site-header">
    <div class="logo-wrap">
      <div class="site-title">
        <span class="brand-main">insta<span class="brand-accent">pic</span></span>
        <span class="brand-sub">by Little Trends — Darwin NT</span>
      </div>
    </div>
  </header>

  <main class="package-page">
    <h1>Choose Your Session ✨</h1>
    <p class="hero-text">Prepay now • Get your code instantly • Walk straight to the mirror</p>

    <div id="flash" class="flash" hidden></div>

    <div class="package-grid">
      <button class="package-portal" data-package-id="P1_STRIP" data-amount-cents="700" style="touch-action: manipulation;">
        <div class="portal-orb-inner">
          <span class="package-name">Quick &amp; Simple</span>
          <span class="package-price">$7.00</span>
          <span class="package-desc">2 strips + digital copy</span>
        </div>
        <div class="portal-glow"></div>
      </button>

      <button class="package-portal popular" data-package-id="P2_STRIP_GIF" data-amount-cents="1300" style="touch-action: manipulation;">
        <div class="portal-orb-inner">
          <span class="package-name">Most Popular ✨</span>
          <span class="package-price">$13.00</span>
          <span class="package-desc">4 strips + GIF / boomerang + digital</span>
        </div>
        <div class="portal-glow"></div>
      </button>

      <button class="package-portal" data-package-id="P3_STRIP_GIF" data-amount-cents="1800" style="touch-action: manipulation;">
        <div class="portal-orb-inner">
          <span class="package-name">Best for Groups</span>
          <span class="package-price">$18.00</span>
          <span class="package-desc">6 strips + GIF / boomerang + digital</span>
        </div>
        <div class="portal-glow"></div>
      </button>
    </div>

    <div id="ticket-result" class="result-box" hidden>
      <h2>Your Code is Ready! 🦘</h2>
      <div id="ticket-code" class="big-code"></div>
      <p class="hint">Show this to the mirror when it’s your turn.<br>Take a screenshot!</p>
    </div>
  </main>

  <footer class="site-footer">
    <small>© Instapic — Have fun, be silly, love the photos forever ✨</small>
  </footer>

  <script src="assets/main.js"></script>
  <script>
    const MOTHERPC_BASE = "https://motherpc.taild1a44c.ts.net";

    const flash = document.getElementById('flash');
    const ticketResult = document.getElementById('ticket-result');
    const ticketCode = document.getElementById('ticket-code');

    function showError(message) {
      flash.innerHTML = `<div class="flash-error">${message}</div>`;
      flash.hidden = false;
    }

    document.querySelectorAll('.package-portal').forEach(btn => {
      btn.addEventListener('click', async () => {
        flash.hidden = true;
        ticketResult.hidden = true;

        const packageId = btn.dataset.packageId;
        const amountCents = Number(btn.dataset.amountCents || "0");

        const oldDisabled = btn.disabled;
        btn.disabled = true;
        btn.style.opacity = "0.7";

        try {
          const res = await fetch(`${MOTHERPC_BASE}/api/create-ticket`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              package_id: packageId,
              amount_cents: amountCents,
              source: "website_test_bypass"
            })
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || `Server error (${res.status})`);
          }

          const code = data.ticket_code || data.code || data.ticket || "";

          if (!code) {
            throw new Error("MotherPC did not return a ticket code");
          }

          ticketCode.textContent = code;
          ticketResult.hidden = false;

          setTimeout(() => {
            window.location.href = `ticket.html?code=${encodeURIComponent(code)}`;
          }, 1200);

        } catch (err) {
          showError(`Could not create code: ${err.message}`);
        } finally {
          btn.disabled = oldDisabled;
          btn.style.opacity = "1";
        }
      });
    });
  </script>
</body>
</html>
