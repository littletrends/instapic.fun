<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Instapic Fun — Prepay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="branding.css">
</head>
<body class="page" data-page="pay" data-timeout-redirect="index.html">
  <main class="card">
    <div id="flash" hidden></div>

    <h1>Choose your session</h1>
    <p class="muted">
      Bridge mode: request your Instapic code from MotherPC, then use that code at the booth.
    </p>

    <div class="package-grid">
      <button type="button" class="package-card package-portal" data-package-id="P1_STRIP" data-amount-cents="700">
        <h2>Strip</h2>
        <p>Classic Instapic print strip.</p>
        <div class="pkg-price">$7.00</div>
        <div class="btn">Get my code</div>
      </button>

      <button type="button" class="package-card package-portal" data-package-id="P2_STRIP_GIF" data-amount-cents="1300">
        <h2>Strip + GIF</h2>
        <p>Photo strip plus motion bonus.</p>
        <div class="pkg-price">$13.00</div>
        <div class="btn">Get my code</div>
      </button>

      <button type="button" class="package-card package-portal" data-package-id="P3_STRIP_GIF" data-amount-cents="1800">
        <h2>Strip + GIF Premium</h2>
        <p>Photo strip and expanded digital bonus set.</p>
        <div class="pkg-price">$18.00</div>
        <div class="btn">Get my code</div>
      </button>
    </div>

    <p class="muted">
      Website Square checkout is not live yet. This page only asks MotherPC to issue a code.
    </p>

    <p><a class="btn" href="index.html">Back to start</a></p>
  </main>

  <script src="assets/main.js"></script>
  <script src="site_core.js"></script>
  <script src="branding.js"></script>
  <script src="pay_runtime.js"></script>
</body>
</html>
